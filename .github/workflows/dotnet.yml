name: CI — Build e Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Ripristina le dipendenze
        run: dotnet restore ConsoleApp1/ConsoleApp1.sln

      - name: Compila
        run: dotnet build ConsoleApp1/ConsoleApp1.sln --no-restore --configuration Release
